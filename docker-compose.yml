services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledger}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 5s
      timeout: 3s
      retries: 5

  ledgerd:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ledger:${POSTGRES_PASSWORD:-ledger}@postgres:5432/ledger?sslmode=disable
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - ledgerd
    ports:
      - "3000:3000"

volumes:
  pgdata:
