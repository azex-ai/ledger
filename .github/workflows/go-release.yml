name: go-release

# Cuts a GitHub release for the Go module on a SemVer tag (e.g. v0.1.0).
# React package releases use the separate ledger-react-v* namespace, so the
# 'v*' filter here never collides with them. Go module distribution itself is
# automatic once the tag exists (the Go proxy pulls it) — this workflow re-runs
# the full verify gate so a tag can never point at code that doesn't pass CI,
# then publishes a GitHub release with notes drawn from CHANGELOG.md.
on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ledger_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -timeout 5m -count=1 ./...
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/ledger_test?sslmode=disable

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
