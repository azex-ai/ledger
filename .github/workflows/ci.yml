name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: go.sum
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ledger_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: go.sum
      - run: go test -race -timeout 5m -count=1 ./...
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/ledger_test?sslmode=disable

  sqlc-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.27.0'
      - name: sqlc diff
        working-directory: postgres
        run: sqlc diff

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: go.sum
      - run: go build ./...

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build container image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ledger:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
