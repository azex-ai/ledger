name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: go.sum
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ledger_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: go.sum
      - run: go test -race -timeout 5m -count=1 ./...
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/ledger_test?sslmode=disable

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: go.sum
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  sqlc-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: sqlc-dev/setup-sqlc@v5
        with:
          sqlc-version: '1.31.1'
      - name: sqlc diff
        working-directory: postgres
        run: sqlc diff

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: go.sum
      - run: go build ./...

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build container image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ledger:ci
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Supply chain: load a single-arch image for scanning + SBOM.
      - name: Build image for scan (amd64, load)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ledger:scan
          platforms: linux/amd64
          cache-from: type=gha
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ledger:scan
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ledger:scan
          format: spdx-json
          artifact-name: ledger-sbom.spdx.json
