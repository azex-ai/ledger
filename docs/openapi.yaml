openapi: 3.1.0
info:
  title: azex-ai/ledger HTTP API
  description: |
    Production-grade double-entry ledger service. Classification-driven
    architecture: deposit / withdrawal / transfer are preset configurations
    of a generic Booking lifecycle, not hardcoded types.

    `info.version` tracks the Go module's release tag (see CHANGELOG.md) —
    bump both together, not independently.

    Companion docs:
      - `docs/api.md`         — long-form prose
      - `docs/INVARIANTS.md`  — what the ledger guarantees
      - `docs/RUNBOOK.md`     — incident response
  version: "0.4.0"
  license:
    name: Apache-2.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local dev
  - url: https://ledger.example.com/api/v1
    description: Production (your deployment)

security:
  - bearerAuth: []

tags:
  - name: System
    description: Health, readiness, system-wide rollups.
  - name: Journals
    description: Append-only double-entry records.
  - name: Balances
    description: Real-time balance reads (checkpoint + delta).
  - name: Reservations
    description: TOCTOU-safe budget locking for reserve/settle flows.
  - name: Bookings
    description: Classification-driven lifecycle records.
  - name: Events
    description: State-transition events emitted by booking transitions.
  - name: Webhooks
    description: Inbound channel callbacks (e.g. on-chain deposits).
  - name: Metadata
    description: Classifications, journal types, templates, currencies.
  - name: Reconciliation
    description: Accounting-equation checks and snapshots.
  - name: Audit
    description: Read-only investigation — journals by account/time, booking trace, reversal chains.
  - name: Platform
    description: Real-time platform-wide balance breakdown and solvency check.
  - name: Trends
    description: Historical daily balance time-series.

paths:
  /system/health:
    get:
      tags: [System]
      summary: Liveness probe (no auth)
      security: []
      responses:
        "200":
          description: Service is up.
  /system/ready:
    get:
      tags: [System]
      summary: Readiness probe — DB connectivity + worker status.
      security: []
      responses:
        "200":
          description: Ready.
        "503":
          description: Not ready.
  /system/balances:
    get:
      tags: [System]
      summary: Aggregated system rollups.
      responses:
        "200":
          description: List of system rollups by classification × currency.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SystemRollupsEnvelope" }

  /journals:
    get:
      tags: [Journals]
      summary: List journals (cursor-paginated, descending id).
      parameters:
        - in: query
          name: cursor
          schema: { type: string, description: "Opaque page cursor from next_cursor" }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: Journals page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JournalListEnvelope" }
    post:
      tags: [Journals]
      summary: Post a balanced journal.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JournalInput" }
      responses:
        "201":
          description: Journal created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JournalEnvelope" }
        "409":
          $ref: "#/components/responses/DomainError"
        "422":
          $ref: "#/components/responses/DomainError"
  /journals/template:
    post:
      tags: [Journals]
      summary: Render a template into a journal and post it.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TemplateExecutionRequest" }
      responses:
        "201":
          description: Journal created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JournalEnvelope" }
        "409":
          $ref: "#/components/responses/DomainError"
        "422":
          $ref: "#/components/responses/DomainError"
  /journals/deposit-tolerance:
    post:
      tags: [Journals]
      summary: Resolve deposit shortfall / overage atomically.
      responses:
        "201":
          description: Plan executed.
        "422":
          $ref: "#/components/responses/DomainError"
  /journals/{uid}:
    get:
      tags: [Journals]
      summary: Get one journal with all its entries.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Journal + entries.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JournalWithEntriesEnvelope" }
        "404":
          $ref: "#/components/responses/NotFound"
  /journals/{uid}/reverse:
    post:
      tags: [Journals]
      summary: Post the full reversal of an existing journal.
      description: >-
        Rejected (409) once the journal has any reversal history, full or
        partial — use reverse-partial to continue a partially-reversed journal.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason, idempotency_key]
              properties:
                reason: { type: string }
                idempotency_key: { type: string }
      responses:
        "201": { description: Reversal posted. }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Already reversed.
  /journals/{uid}/reverse-partial:
    post:
      tags: [Journals]
      summary: Reverse num/den of a journal (partial reversal).
      description: >-
        Reverses num/den of every entry, per-currency balanced via
        largest-remainder allocation. Cumulative reversals never exceed the
        original (409 on overshoot). num == den ("1/1") reverses exactly the
        remaining un-reversed amount — the only way to complete a reversal
        whose earlier fractional steps rounded up.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [num, den, reason, idempotency_key]
              properties:
                num: { type: integer, format: int64, minimum: 1 }
                den: { type: integer, format: int64, minimum: 1 }
                reason: { type: string }
                idempotency_key: { type: string }
      responses:
        "201": { description: Partial reversal posted. }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Cumulative reversal would exceed the original. }
        "422": { $ref: "#/components/responses/DomainError" }

  /entries:
    get:
      tags: [Journals]
      summary: List entries on one account dimension (cursor-paginated).
      parameters:
        - in: query
          name: holder
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: currency
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: cursor
          schema: { type: string, description: "Opaque page cursor from next_cursor" }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: Entries page.

  /balances/{holder}:
    get:
      tags: [Balances]
      summary: All balances for one holder across currencies.
      parameters:
        - in: path
          name: holder
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Balances.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BalancesEnvelope" }
  /balances/{holder}/{currency}:
    get:
      tags: [Balances]
      summary: Balances for one holder × currency.
      parameters:
        - in: path
          name: holder
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: currency
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Balance list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BalancesEnvelope" }
  /balances/{holder}/{currency}/breakdown:
    get:
      tags: [Balances]
      summary: Holder-facing liquidity view (available / pending / locked / total).
      description: >
        Aggregates the holder's classification balances by balance_role and
        layers reservation holds on top: available = Σ role=available − held,
        locked = Σ role=locked + held, pending = Σ role=pending,
        total = available + locked + pending. Reserve enforces its
        availability check against the same available figure.
      parameters:
        - in: path
          name: holder
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: currency
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Balance breakdown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BalanceBreakdownEnvelope" }
  /balances/batch:
    post:
      tags: [Balances]
      summary: Batch balance lookup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [holders, currency_uid]
              properties:
                holders:
                  type: array
                  items: { type: integer, format: int64 }
                currency_uid: { type: string, format: uuid }
      responses:
        "200":
          description: Map of holder → balances.

  /reservations:
    get:
      tags: [Reservations]
      summary: List reservations.
      responses:
        "200": { description: Reservations. }
    post:
      tags: [Reservations]
      summary: Reserve funds (TOCTOU-safe).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReserveInput" }
      responses:
        "201":
          description: Reservation created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReservationEnvelope" }
        "422":
          $ref: "#/components/responses/DomainError"
  /reservations/{uid}/settle:
    post:
      tags: [Reservations]
      summary: Settle reservation with actual amount; remainder auto-released.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actual_amount]
              properties:
                actual_amount: { type: string, description: Decimal as string. }
      responses:
        "200": { description: Settled. }
        "422": { $ref: "#/components/responses/DomainError" }
  /reservations/{uid}/settle-partial:
    post:
      tags: [Reservations]
      summary: Settle part of a reservation; call repeatedly to accumulate.
      description: >-
        First call transitions active → settling. Cumulative settled amount
        may never exceed the reserved amount. The unsettled remainder stays
        held against the balance until finalize. Finish with
        /reservations/{uid}/finalize.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, idempotency_key]
              properties:
                amount: { type: string, description: Decimal as string. }
                idempotency_key:
                  type: string
                  description: >-
                    Required (I-3). SettlePartial accumulates, so a retried
                    request replays idempotently instead of double-applying:
                    same key + same amount succeeds without effect, same key +
                    different amount is a conflict.
      responses:
        "200": { description: Partial settlement recorded. }
        "422": { $ref: "#/components/responses/DomainError" }
  /reservations/{uid}/finalize:
    post:
      tags: [Reservations]
      summary: Finish a partially-settled reservation (settling → settled).
      description: Releases the unsettled remainder. Rejected on a reservation with no partial settlements.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Finalized. }
        "422": { $ref: "#/components/responses/DomainError" }
  /reservations/{uid}/release:
    post:
      tags: [Reservations]
      summary: Release a reservation without settling.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Released. }
        "422": { $ref: "#/components/responses/DomainError" }

  /accounts/{holder}/policy:
    put:
      tags: [Accounts]
      summary: Set (create or update) the freeze/close + balance-floor policy for an account dimension.
      parameters:
        - in: path
          name: holder
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AccountPolicyInput" }
      responses:
        "200":
          description: Policy set.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountPolicyEnvelope" }
        "422": { $ref: "#/components/responses/DomainError" }
  /accounts/{holder}/policies:
    get:
      tags: [Accounts]
      summary: List every policy row for an account holder (across currencies/classifications).
      parameters:
        - in: path
          name: holder
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200": { description: Policies. }

  /bookings:
    get:
      tags: [Bookings]
      summary: List bookings.
      responses:
        "200": { description: Bookings page. }
    post:
      tags: [Bookings]
      summary: Create a booking against a classification's lifecycle.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateBookingInput" }
      responses:
        "201":
          description: Booking created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BookingEnvelope" }
        "422": { $ref: "#/components/responses/DomainError" }
  /bookings/{uid}:
    get:
      tags: [Bookings]
      summary: Get one booking.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Booking.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BookingEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
  /bookings/{uid}/transition:
    post:
      tags: [Bookings]
      summary: Advance a booking's lifecycle state.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransitionInput" }
      responses:
        "200":
          description: Event for the transition.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EventEnvelope" }

  /events:
    get:
      tags: [Events]
      summary: List events.
      responses:
        "200": { description: Events page. }
  /events/{uid}:
    get:
      tags: [Events]
      summary: Get one event.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Event.
        "404": { $ref: "#/components/responses/NotFound" }

  /webhooks/{channel}:
    post:
      tags: [Webhooks]
      summary: Inbound channel callback (e.g. on-chain deposit).
      description: Body shape and signing are channel-specific. Hot path is HMAC-verified.
      security: []
      parameters:
        - in: path
          name: channel
          required: true
          schema: { type: string, enum: [evm, btc, custom] }
      responses:
        "204": { description: Accepted. }
        "401": { description: HMAC verification failed. }

  /classifications:
    get:
      tags: [Metadata]
      summary: List classifications.
      responses:
        "200": { description: Classifications. }
    post:
      tags: [Metadata]
      summary: Create a classification (with optional lifecycle).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClassificationInput" }
      responses:
        "201": { description: Created. }
  /classifications/{uid}/deactivate:
    post:
      tags: [Metadata]
      summary: Deactivate a classification.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Deactivated. }

  /journal-types:
    get:
      tags: [Metadata]
      summary: List journal types.
      responses:
        "200": { description: Journal types. }
    post:
      tags: [Metadata]
      summary: Create a journal type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name]
              properties:
                code: { type: string }
                name: { type: string }
      responses:
        "201": { description: Created. }
  /journal-types/{uid}/deactivate:
    post:
      tags: [Metadata]
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Deactivated. }

  /templates:
    get:
      tags: [Metadata]
      summary: List entry templates.
      responses:
        "200": { description: Templates. }
    post:
      tags: [Metadata]
      summary: Create an entry template.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TemplateInput" }
      responses:
        "201": { description: Created. }
  /templates/{code}/preview:
    post:
      tags: [Metadata]
      summary: Render a template without posting.
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TemplateParams" }
      responses:
        "200": { description: Rendered JournalInput. }
  /templates/{uid}/deactivate:
    post:
      tags: [Metadata]
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Deactivated. }

  /currencies:
    get:
      tags: [Metadata]
      responses:
        "200": { description: Currencies. }
    post:
      tags: [Metadata]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name, exponent]
              properties:
                code: { type: string }
                name: { type: string }
                exponent:
                  type: integer
                  minimum: 0
                  maximum: 18
                  description: >
                    Max decimal places entries in this currency may carry
                    (JPY=0, USD=2, USDT=6, wei=18). Required — 0 is a legal
                    value, so it cannot be defaulted.
      responses:
        "201": { description: Created. }
  /currencies/{uid}/deactivate:
    post:
      tags: [Metadata]
      summary: Deactivate a currency.
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Deactivated. }

  /reconcile:
    post:
      tags: [Reconciliation]
      summary: Run global accounting-equation check.
      responses:
        "200":
          description: Reconciliation result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReconcileResult" }
  /reconcile/account:
    post:
      tags: [Reconciliation]
      summary: Reconcile a single account dimension.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [holder, currency_uid]
              properties:
                holder: { type: integer, format: int64 }
                currency_uid: { type: string, format: uuid }
      responses:
        "200":
          description: Reconciliation result.
  /reconcile/full:
    post:
      tags: [Reconciliation]
      summary: Run the complete 10-check reconciliation suite on-demand.
      description: |
        Heavier, fleet-wide counterpart to `/reconcile` — also verifies
        checkpoint-vs-entries consistency (fleet-scanned, capped by a
        configurable scan limit/timeout and reported as partial if capped),
        orphan entries/reservations, the accounting equation, settlement
        netting, non-negative balances, idempotency-key uniqueness, and stale
        rollup queue items. Runs on the same schedule in the background
        worker; this endpoint triggers an out-of-band run.
      responses:
        "200":
          description: Full reconciliation report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReconcileReport" }

  /snapshots:
    get:
      tags: [Reconciliation]
      summary: List balance snapshots for an account dimension.
      parameters:
        - in: query
          name: holder
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: currency
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200": { description: Snapshots. }

  /audit/journals:
    get:
      tags: [Audit]
      summary: List journals by account dimension or by global time range.
      description: |
        Exactly one mode is selected by the params provided: pass `holder` +
        `currency_uid` (optionally narrowed by `classification_uid` and/or
        `from`/`to`) to list journals touching that account dimension; pass
        `from`/`to` alone to scan a global time range instead. Providing
        neither, or `holder` without `currency_uid`, is a 400.
      parameters:
        - in: query
          name: holder
          schema: { type: integer, format: int64 }
        - in: query
          name: currency_uid
          schema: { type: string, format: uuid }
        - in: query
          name: classification_uid
          schema: { type: string, format: uuid }
        - in: query
          name: from
          schema: { $ref: "#/components/schemas/Timestamp" }
        - in: query
          name: to
          schema: { $ref: "#/components/schemas/Timestamp" }
        - in: query
          name: cursor
          schema: { type: string, description: "Opaque page cursor from next_cursor" }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: Journals page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JournalListEnvelope" }
        "400":
          $ref: "#/components/responses/DomainError"
  /audit/bookings/{uid}/trace:
    get:
      tags: [Audit]
      summary: Trace a booking end-to-end (booking + every event + every linked journal).
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Booking trace.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BookingTraceEnvelope" }
        "404":
          $ref: "#/components/responses/NotFound"
  /audit/journals/{uid}/reversals:
    get:
      tags: [Audit]
      summary: List the reversal chain for a journal (root journal + every journal that transitively reverses it).
      parameters:
        - in: path
          name: uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Reversal chain, oldest first.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JournalListEnvelope" }

  /platform/balances:
    get:
      tags: [Platform]
      summary: Real-time per-classification balance breakdown for a currency.
      description: |
        Computed as `checkpoint.balance + delta`, so it reflects every
        committed journal immediately without waiting for the rollup worker.
      parameters:
        - in: query
          name: currency_uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Platform balance breakdown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformBalanceEnvelope" }
        "400":
          $ref: "#/components/responses/DomainError"
  /platform/solvency:
    get:
      tags: [Platform]
      summary: Compare total user-side liability against custodial system balance for a currency.
      parameters:
        - in: query
          name: currency_uid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Solvency report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SolvencyEnvelope" }
        "400":
          $ref: "#/components/responses/DomainError"

  /balances/trends:
    get:
      tags: [Trends]
      summary: Historical daily balance series for an account dimension.
      description: |
        One point per calendar day in `[from, to]`. Days without journal
        activity are forward-filled from the previous known balance;
        today's point is always the live checkpoint+delta value.
      parameters:
        - in: query
          name: holder
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: currency_uid
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: classification_uid
          schema: { type: string, format: uuid }
        - in: query
          name: from
          required: true
          schema: { $ref: "#/components/schemas/Timestamp" }
        - in: query
          name: to
          required: true
          schema: { $ref: "#/components/schemas/Timestamp" }
      responses:
        "200":
          description: Balance trend points, ascending by date.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BalanceTrendListEnvelope" }
        "400":
          $ref: "#/components/responses/DomainError"


  /holder-tokens:
    post:
      tags: [Holder]
      summary: Mint a holder-scoped read token (host backend, write scope).
      description: >
        Mints a short-lived, read-only token bound to ONE account holder
        (lht_ prefix on the shared bearer header). The host backend calls
        this after its own session auth and hands the token to its frontend;
        the token then authenticates the /holder/* read surface. Leak blast
        radius: one holder, read-only, until exp. TTL defaults to 15m and is
        capped server-side (default 1h).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [holder]
              properties:
                holder: { type: integer, format: int64 }
                ttl_seconds: { type: integer, format: int64, description: "Optional; capped by the server." }
      responses:
        "200":
          description: Minted token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HolderTokenEnvelope" }
        "400":
          $ref: "#/components/responses/DomainError"
  /holder/balances:
    get:
      tags: [Holder]
      summary: The token-bound holder's balances, one row per currency.
      security:
        - holderToken: []
      parameters:
        - in: query
          name: currency_uid
          required: false
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Balance breakdown per currency (total = available + pending + locked).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HolderBalanceListEnvelope" }
  /holder/transactions:
    get:
      tags: [Holder]
      summary: The token-bound holder's translated transaction view.
      description: >
        One row per (journal, currency) net effect on the holder, newest
        first, in user language (kind/kind_label/direction/amount) — no
        double-entry vocabulary. Cursor-paginated at journal granularity.
      security:
        - holderToken: []
      parameters:
        - in: query
          name: cursor
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, format: int32, maximum: 100 }
      responses:
        "200":
          description: Transaction page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HolderTransactionListEnvelope" }
  /holder/holds:
    get:
      tags: [Holder]
      summary: The token-bound holder's outstanding holds.
      security:
        - holderToken: []
      responses:
        "200":
          description: Active holds (locked amounts with expiry).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HolderHoldListEnvelope" }

components:
  securitySchemes:
    holderToken:
      type: http
      scheme: bearer
      bearerFormat: Holder token
      description: >
        Stateless HMAC-signed token minted via POST /holder-tokens (or
        in-process by an embedding host), lht_ prefix, bound to one account
        holder, read-only. Shares the Authorization header with API keys;
        the server disambiguates by prefix.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: |
        Keys are configured server-side as name:scope:secret triples; the
        bearer token is the secret. Scopes are ordered read < write < admin:
        read covers the query surface (plus POST /balances/batch and template
        preview), write adds journals/reversals/reservations/bookings, admin
        adds configuration mutations, account policies, reconcile triggers,
        and period close. Insufficient scope yields business code 10150
        (HTTP 403).

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    DomainError:
      description: Ledger / domain invariant violation.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    Decimal:
      type: string
      description: 'Arbitrary-precision decimal as a string (e.g. 123.456789). NUMERIC(30,18) on the wire.'
      example: "100.00"
    Timestamp:
      type: string
      format: date-time
      example: "2026-04-29T10:00:00Z"

    HolderTokenEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [token, expires_at]
              properties:
                token: { type: string, example: "lht_eyJob2xkZXIiOjQyfQ.c2ln" }
                expires_at: { $ref: "#/components/schemas/Timestamp" }

    HolderBalance:
      type: object
      required: [currency_uid, currency_code, available, pending, locked, total]
      properties:
        currency_uid: { type: string, format: uuid }
        currency_code: { type: string, example: "USD" }
        available: { $ref: "#/components/schemas/Decimal" }
        pending: { $ref: "#/components/schemas/Decimal" }
        locked: { $ref: "#/components/schemas/Decimal" }
        total: { $ref: "#/components/schemas/Decimal", description: "= available + pending + locked" }
    HolderBalanceListEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [list]
              properties:
                list:
                  type: array
                  items: { $ref: "#/components/schemas/HolderBalance" }

    HolderTransaction:
      type: object
      required: [uid, kind, kind_label, direction, amount, currency_uid, currency_code, occurred_at, reversal_of_uid, memo]
      properties:
        uid: { type: string, format: uuid, description: "Journal uid — trace anchor, safe to display." }
        kind: { type: string, example: "deposit_confirm", description: "Stable code (journal type code); anchor for product-side label overrides / i18n." }
        kind_label: { type: string, example: "Deposit", description: "Library-side default display label." }
        direction: { type: string, enum: [in, out] }
        amount: { $ref: "#/components/schemas/Decimal", description: "Absolute net amount for this (journal, currency)." }
        currency_uid: { type: string, format: uuid }
        currency_code: { type: string, example: "USD" }
        occurred_at: { $ref: "#/components/schemas/Timestamp" }
        reversal_of_uid: { type: string, description: "Non-empty when this row is a reversal of that journal." }
        memo: { type: string, description: "journal.metadata[\"memo\"] — host-written user-readable copy; empty when absent." }
    HolderTransactionListEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [list, next_cursor]
              properties:
                list:
                  type: array
                  items: { $ref: "#/components/schemas/HolderTransaction" }
                next_cursor: { type: string, description: "Empty when exhausted." }

    HolderHold:
      type: object
      required: [uid, amount, currency_uid, currency_code, created_at, expires_at]
      properties:
        uid: { type: string, format: uuid }
        amount: { $ref: "#/components/schemas/Decimal", description: "Outstanding hold (unsettled remainder while settling)." }
        currency_uid: { type: string, format: uuid }
        currency_code: { type: string, example: "USD" }
        created_at: { $ref: "#/components/schemas/Timestamp" }
        expires_at: { $ref: "#/components/schemas/Timestamp" }
    HolderHoldListEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [list]
              properties:
                list:
                  type: array
                  items: { $ref: "#/components/schemas/HolderHold" }

    Envelope:
      type: object
      required: [code, message]
      properties:
        code: { type: integer, example: 200, description: "200 on success; business error code otherwise" }
        message: { type: string, example: "ok" }

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            code: { type: integer, example: 14001 }
            message: { type: string, example: "Insufficient balance for this operation" }
            retryable:
              type: boolean
              description: |
                Whether the client may safely retry using the SAME
                idempotency_key. See docs/api.md "Error handling contract".
              example: false

    EntryType:
      type: string
      enum: [debit, credit]
    NormalSide:
      type: string
      enum: [debit, credit]
    HolderRole:
      type: string
      enum: [user, system]

    EntryInput:
      type: object
      required: [account_holder, currency_uid, classification_uid, entry_type, amount]
      properties:
        account_holder: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        classification_uid: { type: string, format: uuid }
        entry_type: { $ref: "#/components/schemas/EntryType" }
        amount:     { $ref: "#/components/schemas/Decimal" }

    JournalInput:
      type: object
      required: [journal_type_uid, idempotency_key, entries]
      properties:
        journal_type_uid: { type: string, format: uuid }
        idempotency_key: { type: string }
        event_uid: { type: string, format: uuid }
        entries:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/EntryInput" }
        metadata:
          type: object
          additionalProperties: { type: string }
        actor_id: { type: integer, format: int64 }
        source:   { type: string }

    Journal:
      type: object
      properties:
        uid: { type: string, format: uuid }
        journal_type_uid: { type: string, format: uuid }
        idempotency_key: { type: string }
        total_debit:  { $ref: "#/components/schemas/Decimal" }
        total_credit: { $ref: "#/components/schemas/Decimal" }
        metadata:
          type: object
          additionalProperties: { type: string }
        actor_id:    { type: integer, format: int64 }
        source:      { type: string }
        reversal_of_uid: { type: string, format: uuid, description: "Empty when this journal is not a reversal." }
        event_uid:   { type: string, format: uuid, description: "Empty when not event-driven." }
        created_at:  { $ref: "#/components/schemas/Timestamp" }
    Entry:
      type: object
      properties:
        uid: { type: string, format: uuid }
        journal_uid: { type: string, format: uuid }
        account_holder: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        classification_uid: { type: string, format: uuid }
        entry_type: { $ref: "#/components/schemas/EntryType" }
        amount:     { $ref: "#/components/schemas/Decimal" }
        created_at: { $ref: "#/components/schemas/Timestamp" }

    JournalEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/Journal" }
    JournalListEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                list:
                  type: array
                  items: { $ref: "#/components/schemas/Journal" }
                next_cursor:
                  type: string
                  description: Opaque cursor; absent/empty when exhausted or when the endpoint is not paginated.
    JournalWithEntriesEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                journal: { $ref: "#/components/schemas/Journal" }
                entries:
                  type: array
                  items: { $ref: "#/components/schemas/Entry" }

    Balance:
      type: object
      properties:
        account_holder: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        classification_uid: { type: string, format: uuid }
        balance: { $ref: "#/components/schemas/Decimal" }
    BalancesEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                list:
                  type: array
                  items: { $ref: "#/components/schemas/Balance" }
                next_cursor:
                  type: string
                  description: Opaque cursor; absent/empty when exhausted or when the endpoint is not paginated.

    BalanceBreakdown:
      type: object
      properties:
        account_holder: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        available: { $ref: "#/components/schemas/Decimal" }
        pending: { $ref: "#/components/schemas/Decimal" }
        locked: { $ref: "#/components/schemas/Decimal" }
        total: { $ref: "#/components/schemas/Decimal" }
    BalanceBreakdownEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/BalanceBreakdown" }

    SystemRollup:
      type: object
      properties:
        currency_uid: { type: string, format: uuid }
        classification_uid: { type: string, format: uuid }
        total_balance: { $ref: "#/components/schemas/Decimal" }
        updated_at: { $ref: "#/components/schemas/Timestamp" }
    SystemRollupsEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                list:
                  type: array
                  items: { $ref: "#/components/schemas/SystemRollup" }
                next_cursor:
                  type: string
                  description: Opaque cursor; absent/empty when exhausted or when the endpoint is not paginated.

    ReserveInput:
      type: object
      required: [account_holder, currency_uid, amount, idempotency_key]
      properties:
        account_holder: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        amount:         { $ref: "#/components/schemas/Decimal" }
        idempotency_key: { type: string }
        expires_in:     { type: string, description: 'Go duration string (e.g. 1h, 30m).' }
    Reservation:
      type: object
      properties:
        uid: { type: string, format: uuid }
        account_holder: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        reserved_amount: { $ref: "#/components/schemas/Decimal" }
        settled_amount:  { $ref: "#/components/schemas/Decimal", nullable: true }
        status:
          type: string
          enum: [active, settling, settled, released]
        journal_uid: { type: string, format: uuid, description: "Empty when no journal linked." }
        idempotency_key: { type: string }
        expires_at: { $ref: "#/components/schemas/Timestamp" }
        created_at: { $ref: "#/components/schemas/Timestamp" }
        updated_at: { $ref: "#/components/schemas/Timestamp" }
    ReservationEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/Reservation" }

    AccountPolicyInput:
      type: object
      required: [status]
      properties:
        currency_uid:      { type: string, format: uuid, description: 'Empty = all currencies for this holder.' }
        classification_uid: { type: string, format: uuid, description: 'Empty = all classifications for this holder/currency.' }
        status:
          type: string
          enum: [active, frozen, closed]
        min_balance:      { $ref: "#/components/schemas/Decimal", description: '0 = no overdraft; negative = overdraft limit; positive = dust floor.' }
        enforce_min_balance: { type: boolean }
        note:             { type: string }
        actor_id:         { type: integer, format: int64 }
    AccountPolicy:
      type: object
      properties:
        uid: { type: string, format: uuid }
        account_holder: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        classification_uid: { type: string, format: uuid }
        status:
          type: string
          enum: [active, frozen, closed]
        min_balance:      { $ref: "#/components/schemas/Decimal" }
        enforce_min_balance: { type: boolean }
        note:             { type: string }
        updated_at: { $ref: "#/components/schemas/Timestamp" }
        created_at: { $ref: "#/components/schemas/Timestamp" }
    AccountPolicyEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/AccountPolicy" }

    CreateBookingInput:
      type: object
      required: [classification_code, account_holder, currency_uid, amount, idempotency_key]
      properties:
        classification_code: { type: string }
        account_holder: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        amount:         { $ref: "#/components/schemas/Decimal" }
        idempotency_key: { type: string }
        channel_name:    { type: string }
        metadata:
          type: object
          additionalProperties: true
        expires_at: { $ref: "#/components/schemas/Timestamp" }
    TransitionInput:
      type: object
      required: [to_status]
      properties:
        to_status: { type: string }
        channel_ref: { type: string }
        amount: { $ref: "#/components/schemas/Decimal" }
        metadata:
          type: object
          additionalProperties: true
        actor_id: { type: integer, format: int64 }
        source:   { type: string }
    Booking:
      type: object
      properties:
        uid: { type: string, format: uuid }
        classification_uid: { type: string, format: uuid }
        account_holder: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        amount: { $ref: "#/components/schemas/Decimal" }
        settled_amount: { $ref: "#/components/schemas/Decimal" }
        status: { type: string }
        channel_name: { type: string }
        channel_ref:  { type: string }
        reservation_uid: { type: string, format: uuid, description: "Empty when no reservation linked." }
        journal_uid:    { type: string, format: uuid, description: "Empty when no journal linked." }
        idempotency_key: { type: string }
        metadata:
          type: object
          additionalProperties: true
        expires_at: { $ref: "#/components/schemas/Timestamp" }
        created_at: { $ref: "#/components/schemas/Timestamp" }
        updated_at: { $ref: "#/components/schemas/Timestamp" }
    BookingEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/Booking" }

    Event:
      type: object
      properties:
        uid: { type: string, format: uuid }
        classification_code: { type: string }
        booking_uid: { type: string, format: uuid }
        account_holder: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        from_status: { type: string }
        to_status:   { type: string }
        amount: { $ref: "#/components/schemas/Decimal" }
        settled_amount: { $ref: "#/components/schemas/Decimal" }
        journal_uid: { type: string, format: uuid, description: "Empty when no journal linked." }
        metadata:
          type: object
          additionalProperties: true
        occurred_at: { $ref: "#/components/schemas/Timestamp" }
        actor_id: { type: integer, format: int64 }
        source: { type: string }
    EventEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/Event" }

    Lifecycle:
      type: object
      required: [initial, transitions]
      properties:
        initial: { type: string }
        terminal:
          type: array
          items: { type: string }
        transitions:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
    ClassificationInput:
      type: object
      required: [code, name, normal_side]
      properties:
        code: { type: string }
        name: { type: string }
        normal_side: { $ref: "#/components/schemas/NormalSide" }
        is_system: { type: boolean }
        lifecycle: { $ref: "#/components/schemas/Lifecycle" }

    TemplateLineInput:
      type: object
      required: [classification_uid, entry_type, holder_role, amount_key]
      properties:
        classification_uid: { type: string, format: uuid }
        entry_type: { $ref: "#/components/schemas/EntryType" }
        holder_role: { $ref: "#/components/schemas/HolderRole" }
        amount_key: { type: string }
        sort_order: { type: integer }
    TemplateInput:
      type: object
      required: [code, name, journal_type_uid, lines]
      properties:
        code: { type: string }
        name: { type: string }
        journal_type_uid: { type: string, format: uuid }
        lines:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/TemplateLineInput" }

    TemplateParams:
      type: object
      required: [holder_id, currency_uid, idempotency_key, amounts]
      properties:
        holder_id: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        idempotency_key: { type: string }
        event_uid: { type: string, format: uuid }
        amounts:
          type: object
          additionalProperties: { $ref: "#/components/schemas/Decimal" }
        actor_id: { type: integer, format: int64 }
        source: { type: string }
        metadata:
          type: object
          additionalProperties: { type: string }
    TemplateExecutionRequest:
      type: object
      required: [template_code, holder_id, currency_uid, idempotency_key, amounts]
      properties:
        template_code: { type: string }
        holder_id: { type: integer, format: int64 }
        currency_uid: { type: string, format: uuid }
        idempotency_key: { type: string }
        event_uid: { type: string, format: uuid }
        amounts:
          type: object
          additionalProperties: { $ref: "#/components/schemas/Decimal" }
        actor_id: { type: integer, format: int64 }
        source: { type: string }
        metadata:
          type: object
          additionalProperties: { type: string }

    ReconcileResult:
      type: object
      properties:
        balanced: { type: boolean }
        gap: { $ref: "#/components/schemas/Decimal" }
        details:
          type: array
          items:
            type: object
            properties:
              account_holder: { type: integer, format: int64 }
              currency_uid: { type: string, format: uuid }
              classification_uid: { type: string, format: uuid }
              expected: { $ref: "#/components/schemas/Decimal" }
              actual:   { $ref: "#/components/schemas/Decimal" }
              drift:    { $ref: "#/components/schemas/Decimal" }
        checked_at: { $ref: "#/components/schemas/Timestamp" }

    BookingTrace:
      type: object
      properties:
        booking: { $ref: "#/components/schemas/Booking" }
        events:
          type: array
          items: { $ref: "#/components/schemas/Event" }
        journals:
          type: array
          items: { $ref: "#/components/schemas/Journal" }
    BookingTraceEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/BookingTrace" }

    PlatformBalance:
      type: object
      properties:
        currency_uid: { type: string, format: uuid }
        user_side:
          type: object
          description: classification code → total (holder > 0).
          additionalProperties: { $ref: "#/components/schemas/Decimal" }
        system_side:
          type: object
          description: classification code → total (holder < 0).
          additionalProperties: { $ref: "#/components/schemas/Decimal" }
    PlatformBalanceEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/PlatformBalance" }

    SolvencyReport:
      type: object
      properties:
        currency_uid: { type: string, format: uuid }
        liability: { $ref: "#/components/schemas/Decimal" }
        custodial: { $ref: "#/components/schemas/Decimal" }
        solvent: { type: boolean }
        margin: { $ref: "#/components/schemas/Decimal", description: 'custodial - liability; negative = under-collateralised.' }
    SolvencyEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SolvencyReport" }

    BalanceTrendPoint:
      type: object
      properties:
        date: { type: string, format: date }
        balance: { $ref: "#/components/schemas/Decimal" }
        inflow: { $ref: "#/components/schemas/Decimal" }
        outflow: { $ref: "#/components/schemas/Decimal" }
    BalanceTrendListEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                list:
                  type: array
                  items: { $ref: "#/components/schemas/BalanceTrendPoint" }
                next_cursor:
                  type: string
                  description: Opaque cursor; absent/empty when exhausted or when the endpoint is not paginated.

    ReconcileReport:
      type: object
      properties:
        overall_passed: { type: boolean }
        run_at: { $ref: "#/components/schemas/Timestamp" }
        checks:
          type: array
          items:
            type: object
            properties:
              name: { type: string, description: "e.g. orphan_entries, checkpoint_balance, accounting_equation" }
              passed: { type: boolean }
              checked_at: { $ref: "#/components/schemas/Timestamp" }
              findings:
                type: array
                items:
                  type: object
                  properties:
                    description: { type: string }
                    detail: { type: string }
